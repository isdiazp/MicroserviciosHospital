spring.application.name=reservas

server.port=8085
spring.datasource.url=jdbc:mysql://localhost:3307/db_reservas
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.docker.compose.enabled=false

# URLs de microservicios
servicio.paciente.url=http://localhost:8081
servicio.medico.url=http://localhost:8082
servicio.agenda.url=http://localhost:8084