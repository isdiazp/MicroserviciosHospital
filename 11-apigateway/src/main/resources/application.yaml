server:
  port: 8080

spring:
  application:
    name: mc-api-gateway

  cloud:
    gateway:
      routes:
        - id: pacientes
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/pacientes/**

        - id: medicos
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/medicos/**

        - id: especialidades
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/especialidades/**

        - id: agendas
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/agendas/**

        - id: reservas
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/reservas/**

        - id: consultas
          uri: http://localhost:8086
          predicates:
            - Path=/api/consultas/**

        - id: pagos
          uri: http://localhost:8087
          predicates:
            - Path=/api/pagos/**

        - id: recetas
          uri: http://localhost:8088
          predicates:
            - Path=/api/recetas/**

        - id: historialclinico
          uri: http://localhost:8089
          predicates:
            - Path=/api/historiales/**

        - id: notificaciones
          uri: http://localhost:8090
          predicates:
            - Path=/api/notificaciones/**

