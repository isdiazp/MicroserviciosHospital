    depends_on:
      - db_mysql

  # Microservicio notificaciones
  notificaciones:
    build:
      context: ./10-notificaciones
      dockerfile: Dockerfile
    container_name: 10-notificaciones
    ports:
      - "8090:8090"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db_mysql:3306/db_notificaciones
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SERVICIO_PACIENTE_URL=http://paciente:8081
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      - db_mysql

volumes:
  mysql_data:

networks:
  hospital-network:
    driver: bridge